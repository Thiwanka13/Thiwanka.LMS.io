<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyLMS - Learning Management System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f5f7fb;
    color:#222;
    transition:.4s;
}

/* Dark Mode */

body.dark{
    background:#0f172a;
    color:#fff;
}

/* Header */

header{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    background:#2563eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    z-index:1000;
}

.logo{
    color:#fff;
    font-size:28px;
    font-weight:700;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:500;
}

nav ul li a:hover{
    color:#ffd54f;
}

/* Theme Button */

.theme-btn{
    border:none;
    background:white;
    color:#2563eb;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

/* Hero */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
}

.hero h1{
    font-size:55px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:30px;
}

.hero button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#2563eb;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.hero button:hover{
    transform:scale(1.08);
}

/* Mobile */

.menu{
    display:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

@media(max-width:768px){

nav{
    display:none;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    background:#2563eb;
}

nav ul{
    flex-direction:column;
}

nav ul li{
    margin:20px;
}

nav.show{
    display:block;
}

.menu{
    display:block;
}

.hero h1{
    font-size:38px;
}

.hero p{
    font-size:18px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">MyLMS</div>

<div class="menu" onclick="menuToggle()">
☰
</div>

<nav id="nav">

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Courses</a></li>

<li><a href="#">About</a></li>

<li><a href="#">Contact</a></li>

<li>
<button class="theme-btn" onclick="theme()">
🌙
</button>
</li>

</ul>

</nav>

</header>

<section class="hero">

<div>

<h1>Learn Without Limits</h1>

<p>
Build your future with Programming, AI, Data Science and more.
</p>

<button>
Get Started
</button>

</div>

</section>

<script>

function theme(){

document.body.classList.toggle("dark");

}

function menuToggle(){

document.getElementById("nav").classList.toggle("show");

}

</script>

</body>
</html>
